name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: go build -ldflags="-H=windowsgui" -o folderCleanupX.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: folderCleanupX
          path: folderCleanupX.exe

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: folderCleanupX.exe
          generate_release_notes: true
