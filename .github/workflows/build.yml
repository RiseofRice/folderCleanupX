name: Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: go build -trimpath -ldflags="-s -w -H=windowsgui" -o folderCleanupX.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: folderCleanupX
          path: folderCleanupX.exe
