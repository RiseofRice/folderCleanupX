name: Auto Tag

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create incremental release tag
        run: |
          BASE_VERSION=$(tr -d '[:space:]' < VERSION)
          LATEST=$(git tag -l "v${BASE_VERSION}.*" | sed -E "s/^v${BASE_VERSION}\.//" | sort -n | tail -1)
          NEXT=$(( ${LATEST:-0} + 1 ))
          TAG="v${BASE_VERSION}.${NEXT}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
